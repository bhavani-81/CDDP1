<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invitation Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f3f0ff;
            font-family: "Segoe UI", sans-serif;
        }
        .card {
            width: 400px;
            margin: 60px auto;
            padding: 30px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .title {
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .content {
            font-size: 15px;
            line-height: 1.6;
        }
        .highlight {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
        }
        .footer {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">You're Invited!</div>
    <div class="subtitle">Join us for a special occasion</div>

    <div class="content">
        We are delighted to invite you to celebrate<br>
        <div class="highlight">✨ Birthday Celebration ✨</div>
        📅 Date: 25 December 2025<br>
        ⏰ Time: 6:00 PM onwards<br>
        📍 Venue: Grand Hall, City Center
    </div>

    <div class="footer">
        Looking forward to celebrating together 💖
    </div>
</div>

</body>
</html>
